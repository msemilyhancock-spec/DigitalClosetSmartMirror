name = "mirror-gemini-tagger"
main = "index.js"
compatibility_date = "2024-01-01"

# Set your Gemini API key as a secret (never in this file):
#   wrangler secret put GEMINI_API_KEY
#
# Then deploy:
#   wrangler deploy
#
# The worker URL will be something like:
#   https://mirror-gemini-tagger.<your-subdomain>.workers.dev
#
# Put that URL in your config.js:
#   window.MIRROR_CONFIG.aiWorkerUrl = 'https://mirror-gemini-tagger.<your-subdomain>.workers.dev';
